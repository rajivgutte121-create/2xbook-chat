<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>2X BOOK — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, update, get, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAItHjlPTWJBM8jGjWGUX8oUGFqfP_cpgo",
  authDomain:        "xbook-chat.firebaseapp.com",
  databaseURL:       "https://xbook-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "xbook-chat",
  storageBucket:     "xbook-chat.firebasestorage.app",
  messagingSenderId: "652493061355",
  appId:             "1:652493061355:web:396fdf39a961024b3e52ae",
  measurementId:     "G-YZBRFYNVHN"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const ADMIN_USER = "2xbook";
const ADMIN_PASS = "modiji";

let selectedSessId = null;
let unsubChat = null;
let prevTotalMsgs = 0;
let mediaRecorder = null, audioChunks = [], recordStart = 0, recTimer = null;

window.doLogin = () => {
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    document.getElementById('loginOverlay').style.display = 'none';
    listenSessions();
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    showToast('✅ Login successful!');
  } else { document.getElementById('loginErr').style.display = 'block'; }
};
window.loginKey = (e) => { if(e.key==='Enter') window.doLogin(); };

function listenSessions() {
  onValue(ref(db, 'sessions'), snap => renderSessionList(snap.val() || {}));
}

function renderSessionList(data) {
  const list = document.getElementById('sessionList');
  const noSess = document.getElementById('noSessions');
  const entries = Object.entries(data);

  let totalUnread = 0, totalMsgs = 0, newCustName = '';
  entries.forEach(([,s]) => {
    totalUnread += (s.unread||0);
    totalMsgs += s.msgs ? Object.keys(s.msgs).length : 0;
  });

  if (totalMsgs > prevTotalMsgs && prevTotalMsgs !== 0) {
    beep();
    // browser notification
    entries.forEach(([,s]) => { if ((s.unread||0)>0) newCustName = s.name; });
    if ('Notification' in window && Notification.permission === 'granted' && document.hidden) {
      new Notification('2X Book — Naya message!', { body: (newCustName||'Customer') + ' ne message bheja', icon:'' });
    }
  }
  prevTotalMsgs = totalMsgs;

  const badge = document.getElementById('badge');
  badge.textContent = totalUnread;
  badge.style.display = totalUnread > 0 ? 'inline-flex' : 'none';
  document.title = totalUnread > 0 ? `(${totalUnread}) 2X BOOK Admin` : '2X BOOK — Admin Panel';

  if (entries.length === 0) { list.innerHTML=''; noSess.style.display='block'; list.appendChild(noSess); return; }
  noSess.style.display = 'none';
  entries.sort((a,b)=>(b[1].lastTime||0)-(a[1].lastTime||0));

  list.innerHTML = '';
  entries.forEach(([id, sess]) => {
    const msgs = sess.msgs ? Object.values(sess.msgs) : [];
    const last = msgs[msgs.length-1];
    let preview = 'Koi message nahi';
    if (last) preview = last.type==='image'?'📷 Image':last.type==='voice'?'🎤 Voice message':(last.text||'').slice(0,36);
    const unread = sess.unread||0;
    const online = sess.online ? '🟢' : '⚫';
    const item = document.createElement('div');
    item.className = 'sess-item' + (id===selectedSessId?' active':'');
    item.onclick = () => openSession(id, sess.name);
    item.innerHTML = `<div class="sess-name">${online} ${esc(sess.name||'Unknown')}${unread>0?`<span class="ubadge">${unread}</span>`:''}</div>
      <div class="sess-preview">${esc(preview)}</div>
      <div class="sess-time">${last?fmtTime(last.time):''}</div>`;
    list.appendChild(item);
  });
}

function openSession(id, name) {
  selectedSessId = id;
  update(ref(db, `sessions/${id}`), { unread:0 });
  document.getElementById('emptyPane').style.display='none';
  document.getElementById('chatPaneBody').style.display='flex';
  document.getElementById('paneName').textContent = name||id;
  document.getElementById('paneAvatar').textContent = (name||'?')[0].toUpperCase();
  if (unsubChat) unsubChat();
  unsubChat = onValue(ref(db, `sessions/${id}/msgs`), snap => {
    renderChat(snap, id);
    update(ref(db, `sessions/${id}`), { unread:0 });
  });
  document.getElementById('sidebar').classList.remove('open');
}

function renderChat(snap, sid) {
  const c = document.getElementById('adminMsgs');
  const wasBot = c.scrollHeight - c.scrollTop - c.clientHeight < 150;
  const data = snap.val();
  c.innerHTML = '';
  if (!data) { c.innerHTML='<div class="no-msgs">Abhi koi message nahi.</div>'; return; }
  const msgs = Object.entries(data).sort((a,b)=>(a[1].time||0)-(b[1].time||0));

  // mark customer msgs as seen
  msgs.forEach(([key,m]) => {
    if (m.from==='customer' && !m.seen) update(ref(db, `sessions/${sid}/msgs/${key}`), { seen:true });
  });

  let lastDate = '';
  msgs.forEach(([key,msg]) => {
    const ds = new Date(msg.time).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
    const today = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
    if (ds!==lastDate){lastDate=ds;const d=document.createElement('div');d.className='date-div';d.textContent=ds===today?'Aaj':ds;c.appendChild(d);}
    const isSent = msg.from === 'admin';
    const w = document.createElement('div');
    w.className = 'msg ' + (isSent?'sent':'recv');
    if (!isSent){const s=document.createElement('div');s.className='msg-sender';s.textContent=msg.senderName||'Customer';w.appendChild(s);}
    const b = document.createElement('div'); b.className='bubble';
    if (msg.type==='image'){const i=document.createElement('img');i.src=msg.text;i.className='msg-img';i.onclick=()=>openLightbox(msg.text);b.appendChild(i);}
    else if (msg.type==='voice'){const a=document.createElement('audio');a.src=msg.text;a.controls=true;a.className='msg-audio';b.appendChild(a);}
    else b.textContent = msg.text;
    w.appendChild(b);
    const meta=document.createElement('div');meta.className='msg-time';
    let tick='';
    if (isSent) tick = msg.seen ? ' <span class="tick seen">✓✓</span>' : ' <span class="tick">✓</span>';
    meta.innerHTML = fmtTime(msg.time) + tick;
    w.appendChild(meta);
    c.appendChild(w);
  });
  if (wasBot) scrollBot();
}

window.adminSend = () => {
  if (!selectedSessId) return;
  const inp = document.getElementById('adminInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value=''; autoResize(inp);
  update(ref(db, `sessions/${selectedSessId}`), { adminTyping:false });
  push(ref(db, `sessions/${selectedSessId}/msgs`), { from:'admin', senderName:'2X Book Support', text, type:'text', time:Date.now() });
  update(ref(db, `sessions/${selectedSessId}`), { lastTime:serverTimestamp() });
};
window.adminSendKey = (e) => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();window.adminSend();} };
let adminTypingTimer = null;
window.adminTyping = () => {
  if (!selectedSessId) return;
  update(ref(db, `sessions/${selectedSessId}`), { adminTyping:true });
  clearTimeout(adminTypingTimer);
  adminTypingTimer = setTimeout(()=>update(ref(db, `sessions/${selectedSessId}`), { adminTyping:false }), 2000);
};
window.adminPickImg = () => document.getElementById('adminFileInput').click();
window.adminImgChosen = (e) => {
  if (!selectedSessId) return;
  const file = e.target.files[0]; if(!file) return;
  if (file.size > 2*1024*1024) { showToast('❌ Image 2MB se chhoti rakho!'); return; }
  e.target.value='';
  const reader = new FileReader();
  reader.onload = ev => { push(ref(db, `sessions/${selectedSessId}/msgs`), { from:'admin', senderName:'2X Book Support', text:ev.target.result, type:'image', time:Date.now() }); update(ref(db, `sessions/${selectedSessId}`), { lastTime:serverTimestamp() }); showToast('✅ Sent!'); };
  reader.readAsDataURL(file);
};

/* voice */
window.toggleVoice = async () => {
  if (!selectedSessId) { showToast('Pehle customer select karo'); return; }
  if (mediaRecorder && mediaRecorder.state === 'recording') { stopRecording(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    mediaRecorder = new MediaRecorder(stream); audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type:'audio/webm' });
      if (blob.size > 1024*1024) { showToast('❌ Voice 1MB se chhota rakho'); stream.getTracks().forEach(t=>t.stop()); return; }
      const reader = new FileReader();
      reader.onload = ev => { push(ref(db, `sessions/${selectedSessId}/msgs`), { from:'admin', senderName:'2X Book Support', text:ev.target.result, type:'voice', time:Date.now() }); update(ref(db, `sessions/${selectedSessId}`), { lastTime:serverTimestamp() }); showToast('✅ Voice sent!'); };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start(); recordStart = Date.now();
    document.getElementById('recBar').style.display='flex';
    document.getElementById('micBtn').classList.add('recording');
    recTimer = setInterval(()=>{ const s=Math.floor((Date.now()-recordStart)/1000); document.getElementById('recTime').textContent=`0:${s<10?'0':''}${s}`; if(s>=30)stopRecording(); },200);
  } catch(err){ showToast('❌ Mic permission do!'); }
};
function stopRecording(){ if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop(); clearInterval(recTimer); document.getElementById('recBar').style.display='none'; document.getElementById('micBtn').classList.remove('recording'); }
window.cancelVoice = () => { if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.onstop=null;mediaRecorder.stop();mediaRecorder.stream.getTracks().forEach(t=>t.stop());} clearInterval(recTimer); document.getElementById('recBar').style.display='none'; document.getElementById('micBtn').classList.remove('recording'); };

window.clearChat = () => { if(!selectedSessId||!confirm('Chat clear karein?'))return; set(ref(db,`sessions/${selectedSessId}/msgs`),null); showToast('🗑 Cleared'); };
window.deleteSession = () => { if(!selectedSessId||!confirm('Customer delete karein?'))return; set(ref(db,`sessions/${selectedSessId}`),null); selectedSessId=null; document.getElementById('emptyPane').style.display='flex'; document.getElementById('chatPaneBody').style.display='none'; showToast('🗑 Deleted'); };
window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');

function beep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o.start();o.stop(ctx.currentTime+0.3);}catch(e){}}
function scrollBot(){const e=document.getElementById('adminMsgs');requestAnimationFrame(()=>{e.scrollTop=e.scrollHeight;});}
function fmtTime(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
window.autoResize=(el)=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};
window.openLightbox=(s)=>{document.getElementById('lbImg').src=s;document.getElementById('lightbox').style.display='flex';};
window.closeLightbox=()=>{document.getElementById('lightbox').style.display='none';};
let toastT;
function showToast(m,d=3000){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),d);}
window.addEventListener('DOMContentLoaded',()=>{document.getElementById('adminUser').focus();});
</script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;height:100dvh;background:#0d1117;color:#e6edf3;font-family:'Inter',sans-serif;overflow:hidden;}
#root{display:flex;flex-direction:column;height:100dvh;max-height:100dvh;overflow:hidden;}

.topbar{display:flex;align-items:center;gap:.6rem;padding:.6rem .9rem;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;}
.tb-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;background:linear-gradient(135deg,#fce475,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#badge{background:#e3282c;color:#fff;border-radius:999px;font-size:.62rem;font-weight:700;padding:2px 6px;min-width:18px;text-align:center;display:none;align-items:center;justify-content:center;}
.mob-menu-btn{display:none;margin-left:auto;background:none;border:1px solid #30363d;color:#8b949e;border-radius:8px;padding:.28rem .65rem;font-size:.8rem;cursor:pointer;font-family:inherit;align-items:center;gap:.3rem;}

#loginOverlay{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#1e1505,#0d1117);z-index:100;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.al-box{background:#161b22;border:1.5px solid rgba(212,168,67,.3);border-radius:18px;padding:2.25rem 1.75rem;width:100%;max-width:330px;display:flex;flex-direction:column;align-items:center;gap:1rem;}
.al-logo{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.08em;background:linear-gradient(135deg,#fce475,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.al-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.08em;color:#d4a843;}
.al-box input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:10px;color:#e6edf3;font-family:'Inter',sans-serif;font-size:.95rem;padding:.7rem 1rem;outline:none;transition:border-color .2s;}
.al-box input:focus{border-color:#d4a843;}
#loginErr{font-size:.75rem;color:#e3282c;display:none;}
.al-btn{width:100%;padding:.75rem;background:linear-gradient(135deg,#d4a843,#a07820);border:none;border-radius:10px;color:#000;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.1em;cursor:pointer;}

.body{display:flex;flex:1;overflow:hidden;}
#sidebar{width:265px;flex-shrink:0;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;}
.sb-head{padding:.7rem .9rem;border-bottom:1px solid #30363d;font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8b949e;}
#sessionList{flex:1;overflow-y:auto;}
#sessionList::-webkit-scrollbar{width:3px;}#sessionList::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px;}
#noSessions{padding:2rem 1rem;text-align:center;color:#484f58;font-size:.78rem;line-height:1.6;}
.sess-item{padding:.7rem .9rem;border-bottom:1px solid #21262d;cursor:pointer;transition:background .15s;position:relative;}
.sess-item:hover{background:rgba(255,255,255,.03);}.sess-item.active{background:rgba(212,168,67,.07);border-left:3px solid #d4a843;}
.sess-name{font-weight:600;font-size:.82rem;display:flex;align-items:center;gap:.35rem;}
.sess-preview{font-size:.7rem;color:#8b949e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.sess-time{font-size:.62rem;color:#484f58;position:absolute;top:.7rem;right:.7rem;}
.ubadge{background:#e3282c;color:#fff;border-radius:999px;font-size:.6rem;font-weight:700;padding:1px 5px;}

.pane{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#emptyPane{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;color:#484f58;}
.ep-icon{font-size:2.8rem;}.ep-txt{font-size:.82rem;}
#chatPaneBody{display:none;flex-direction:column;flex:1;overflow:hidden;}
.pane-top{padding:.6rem .9rem;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:.65rem;flex-shrink:0;}
.pane-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1a4b7a,#0d2d52);border:1.5px solid rgba(212,168,67,.3);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}
.pane-name{font-weight:600;font-size:.88rem;}.pane-status{font-size:.68rem;color:#3fb950;}
.pane-btns{margin-left:auto;display:flex;gap:.4rem;}
.sm-btn{background:none;border:1px solid #30363d;color:#8b949e;border-radius:8px;padding:.25rem .6rem;font-size:.7rem;cursor:pointer;font-family:inherit;transition:border-color .2s,color .2s;}
.sm-btn:hover{border-color:#d4a843;color:#d4a843;}.sm-btn.danger:hover{border-color:#e3282c;color:#e3282c;}

.msgs{flex:1;overflow-y:auto;padding:1rem .9rem;display:flex;flex-direction:column;gap:.5rem;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:3px;}.msgs::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px;}
.no-msgs{text-align:center;color:#484f58;font-size:.78rem;padding:2rem;}
.date-div{text-align:center;font-size:.65rem;color:#8b949e;position:relative;margin:.3rem 0;}
.date-div::before,.date-div::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:#21262d;}
.date-div::before{left:0;}.date-div::after{right:0;}
.msg{display:flex;flex-direction:column;max-width:75%;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.sent{align-self:flex-end;align-items:flex-end;}.msg.recv{align-self:flex-start;align-items:flex-start;}
.bubble{padding:.6rem .85rem;border-radius:14px;font-size:.9rem;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
.msg.sent .bubble{background:linear-gradient(135deg,#1a6b3c,#238636);border-bottom-right-radius:4px;color:#fff;}
.msg.recv .bubble{background:#21262d;border:1px solid #30363d;border-bottom-left-radius:4px;}
.msg-sender{font-size:.65rem;font-weight:700;color:#d4a843;margin-bottom:2px;padding:0 3px;}
.msg-time{font-size:.62rem;color:#8b949e;margin-top:2px;padding:0 3px;display:flex;align-items:center;gap:3px;}
.tick{color:#8b949e;font-size:.7rem;}.tick.seen{color:#4fc3f7;}
.msg-img{max-width:200px;max-height:180px;border-radius:10px;display:block;cursor:zoom-in;object-fit:cover;}
.msg-audio{max-width:220px;height:40px;}

.recbar{display:none;align-items:center;gap:.6rem;padding:.5rem .9rem;background:#2a1a1a;border-top:1px solid #5a2020;flex-shrink:0;}
.recdot{width:12px;height:12px;border-radius:50%;background:#e3282c;animation:recpulse 1s infinite;}
@keyframes recpulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.rectime{font-size:.85rem;color:#fff;font-weight:600;}
.rec-cancel{margin-left:auto;background:none;border:1px solid #5a2020;color:#e3282c;border-radius:8px;padding:.3rem .8rem;font-size:.75rem;cursor:pointer;font-family:inherit;}
.rec-hint{font-size:.7rem;color:#8b949e;}

.inputbar{display:flex;align-items:flex-end;gap:.45rem;padding:.6rem .7rem calc(.6rem + env(safe-area-inset-bottom));background:#161b22;border-top:1px solid #30363d;flex-shrink:0;position:relative;z-index:5;}
.inputbar textarea{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:12px;color:#e6edf3;font-family:'Inter',sans-serif;font-size:.9rem;padding:.55rem .8rem;resize:none;min-height:42px;max-height:120px;outline:none;line-height:1.45;transition:border-color .2s;}
.inputbar textarea:focus{border-color:#d4a843;}.inputbar textarea::placeholder{color:#484f58;}
.ico-btn{width:40px;height:40px;border-radius:10px;border:1px solid #30363d;background:rgba(255,255,255,.03);color:#8b949e;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;transition:border-color .2s,color .2s,background .2s;}
.ico-btn:hover{border-color:#d4a843;color:#d4a843;}
.ico-btn.recording{background:#e3282c;border-color:#e3282c;color:#fff;animation:recpulse 1s infinite;}
.send-btn{width:40px;height:40px;border-radius:10px;border:none;background:linear-gradient(135deg,#25d366,#1aad55);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(37,211,102,.35);transition:transform .15s;}
.send-btn:hover{transform:scale(1.08);}.send-btn:active{transform:scale(.96);}

#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center;cursor:zoom-out;}
#lbImg{max-width:92vw;max-height:88vh;border-radius:12px;object-fit:contain;}
.toast{position:fixed;bottom:90px;right:14px;background:#21262d;border:1px solid rgba(212,168,67,.35);border-radius:12px;padding:.6rem 1rem;font-size:.78rem;z-index:400;display:none;align-items:center;gap:.5rem;max-width:260px;box-shadow:0 6px 20px rgba(0,0,0,.4);}
.toast.show{display:flex;}

@media(max-width:620px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:40;width:82vw;max-width:280px;transform:translateX(-100%);transition:transform .26s ease;}
  #sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.5);}
  .mob-menu-btn{display:flex;}.msg{max-width:86%;}
}
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="al-box">
    <div class="al-logo">2X BOOK</div>
    <div class="al-title">🛡️ Admin Panel</div>
    <input id="adminUser" type="text" placeholder="Username" autocomplete="off">
    <input id="adminPass" type="password" placeholder="Password" onkeydown="loginKey(event)">
    <div id="loginErr">❌ Galat username ya password!</div>
    <button class="al-btn" onclick="doLogin()">LOGIN</button>
  </div>
</div>

<div id="root">
  <div class="topbar">
    <div class="tb-logo">2X BOOK</div>
    <span style="font-size:.75rem;color:#8b949e;">Admin Panel</span>
    <span id="badge"></span>
    <button class="mob-menu-btn" onclick="toggleSidebar()">☰ Chats</button>
  </div>

  <div class="body">
    <div id="sidebar">
      <div class="sb-head">💬 Customers</div>
      <div id="sessionList">
        <div id="noSessions">Abhi koi customer nahi hai.<br><br>Customer link share karo! 😊</div>
      </div>
    </div>

    <div class="pane">
      <div id="emptyPane">
        <div class="ep-icon">💬</div>
        <div class="ep-txt">Kisi customer ko select karo</div>
      </div>
      <div id="chatPaneBody">
        <div class="pane-top">
          <div class="pane-avatar" id="paneAvatar">?</div>
          <div>
            <div class="pane-name" id="paneName">—</div>
            <div class="pane-status">🟢 Online</div>
          </div>
          <div class="pane-btns">
            <button class="sm-btn" onclick="clearChat()">🗑 Clear</button>
            <button class="sm-btn danger" onclick="deleteSession()">✕ Delete</button>
          </div>
        </div>
        <div class="msgs" id="adminMsgs"></div>

        <div class="recbar" id="recBar">
          <div class="recdot"></div>
          <span class="rectime" id="recTime">0:00</span>
          <span class="rec-hint">Recording... (mic dabao bhejne ke liye)</span>
          <button class="rec-cancel" onclick="cancelVoice()">Cancel</button>
        </div>

        <div class="inputbar">
          <button class="ico-btn" onclick="adminPickImg()" title="Photo">📷</button>
          <input type="file" id="adminFileInput" accept="image/*" onchange="adminImgChosen(event)" style="display:none">
          <button class="ico-btn" id="micBtn" onclick="toggleVoice()" title="Voice">🎤</button>
          <textarea id="adminInput" placeholder="Customer ko reply karo..." rows="1" onkeydown="adminSendKey(event)" oninput="autoResize(this);adminTyping();"></textarea>
          <button class="send-btn" onclick="adminSend()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()"><img id="lbImg" src="" alt=""></div>
<div class="toast" id="toast"></div>
</body>
</html>
