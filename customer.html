<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>2X BOOK — Support Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, update, get, serverTimestamp, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAItHjlPTWJBM8jGjWGUX8oUGFqfP_cpgo",
  authDomain:        "xbook-chat.firebaseapp.com",
  databaseURL:       "https://xbook-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "xbook-chat",
  storageBucket:     "xbook-chat.firebasestorage.app",
  messagingSenderId: "652493061355",
  appId:             "1:652493061355:web:396fdf39a961024b3e52ae",
  measurementId:     "G-YZBRFYNVHN"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const SUPPORT_NUMBER = "09201849287";   // call + whatsapp
const WELCOME_MSG    = "🌟 2X mein aapka swagat hai 🌟";

let custSessionId = null;
let custName = '';

/* ══ CHECK SAVED SESSION (chat yaad rahe) ══ */
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('2xbook_my_session');
  const savedName = localStorage.getItem('2xbook_my_name');
  if (saved && savedName) {
    custSessionId = saved;
    custName = savedName;
    // verify it still exists in firebase, else make fresh
    get(ref(db, `sessions/${saved}`)).then(snap => {
      if (snap.exists()) {
        enterChat(false);
      } else {
        // session deleted by admin → start fresh
        localStorage.removeItem('2xbook_my_session');
        localStorage.removeItem('2xbook_my_name');
        show('namePrompt');
        document.getElementById('custNameInput').focus();
      }
    }).catch(() => { show('namePrompt'); });
  } else {
    show('namePrompt');
    document.getElementById('custNameInput').focus();
  }
});

window.confirmName = async () => {
  const val = document.getElementById('custNameInput').value.trim();
  if (!val) { document.getElementById('custNameInput').focus(); return; }
  custName = val;
  custSessionId = 'sess_' + Date.now();

  localStorage.setItem('2xbook_my_session', custSessionId);
  localStorage.setItem('2xbook_my_name', custName);

  await set(ref(db, `sessions/${custSessionId}`), {
    name: custName, createdAt: serverTimestamp(), lastTime: serverTimestamp(), unread: 0, online: true
  });
  onDisconnect(ref(db, `sessions/${custSessionId}/online`)).set(false);

  enterChat(true);
};
window.nameKey = (e) => { if (e.key === 'Enter') window.confirmName(); };

function enterChat(isNew) {
  hide('namePrompt');
  show('chatScreen');
  onDisconnect(ref(db, `sessions/${custSessionId}/online`)).set(false);
  update(ref(db, `sessions/${custSessionId}`), { online:true });

  if (isNew) {
    setTimeout(() => {
      pushMsg({ from:'admin', senderName:'2X Book Support', text:WELCOME_MSG, type:'text', time:Date.now() });
    }, 1200);
  }

  onValue(ref(db, `sessions/${custSessionId}/msgs`), snap => renderMsgs(snap));
}

window.custSend = () => {
  const inp = document.getElementById('custInput');
  const text = inp.value.trim();
  if (!text || !custSessionId) return;
  inp.value = ''; autoResize(inp);
  pushMsg({ from:'customer', senderName:custName, text, type:'text', time:Date.now() });
};
window.custSendKey = (e) => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();window.custSend();} };
window.custPickImg = () => document.getElementById('custFileInput').click();
window.custImgChosen = (e) => {
  const file = e.target.files[0]; if(!file) return;
  if (file.size > 2*1024*1024) { showToast('❌ Image 2MB se chhoti honi chahiye!'); return; }
  e.target.value = '';
  showToast('📤 Image send ho rahi hai...');
  const reader = new FileReader();
  reader.onload = ev => {
    pushMsg({ from:'customer', senderName:custName, text:ev.target.result, type:'image', time:Date.now() });
    showToast('✅ Image send ho gayi!');
  };
  reader.readAsDataURL(file);
};

function pushMsg(msg) {
  push(ref(db, `sessions/${custSessionId}/msgs`), msg);
  if (msg.from === 'customer') {
    get(ref(db, `sessions/${custSessionId}/unread`)).then(snap => {
      update(ref(db, `sessions/${custSessionId}`), { unread:(snap.val()||0)+1, lastTime:serverTimestamp() });
    });
  }
}

function renderMsgs(snap) {
  const c = document.getElementById('custMsgs');
  const wasBot = c.scrollHeight - c.scrollTop - c.clientHeight < 150;
  const data = snap.val();
  c.innerHTML = '';
  if (!data) { c.innerHTML = '<div class="empty-hint">💬 Message likhkar baat shuru karo</div>'; return; }
  const msgs = Object.values(data).sort((a,b)=>(a.time||0)-(b.time||0));
  let lastDate = '';
  msgs.forEach(msg => {
    const ds = new Date(msg.time).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
    const today = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
    if (ds !== lastDate) { lastDate=ds; const d=document.createElement('div'); d.className='date-div'; d.textContent=ds===today?'Aaj':ds; c.appendChild(d); }
    const isSent = msg.from === 'customer';
    const w = document.createElement('div');
    w.className = 'msg ' + (isSent?'sent':'recv admin-bubble');
    if (!isSent) { const s=document.createElement('div'); s.className='msg-sender'; s.textContent='2X Book Support'; w.appendChild(s); }
    const b = document.createElement('div'); b.className='bubble';
    if (msg.type==='image') { const i=document.createElement('img'); i.src=msg.text; i.className='msg-img'; i.onclick=()=>openLightbox(msg.text); b.appendChild(i); }
    else b.textContent = msg.text;
    w.appendChild(b);
    const t=document.createElement('div'); t.className='msg-time'; t.textContent=fmtTime(msg.time); w.appendChild(t);
    c.appendChild(w);
  });
  if (wasBot) scrollBot();
}

function show(id){document.getElementById(id).style.display='flex';}
function hide(id){document.getElementById(id).style.display='none';}
function scrollBot(){const e=document.getElementById('custMsgs');requestAnimationFrame(()=>{e.scrollTop=e.scrollHeight;});}
function fmtTime(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
window.autoResize=(el)=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};
window.openLightbox=(s)=>{document.getElementById('lbImg').src=s;document.getElementById('lightbox').style.display='flex';};
window.closeLightbox=()=>{document.getElementById('lightbox').style.display='none';};
let toastT;
function showToast(m,d=3000){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),d);}

window.callSupport = () => { window.location.href = 'tel:' + SUPPORT_NUMBER; };
window.waSupport   = () => {
  let n = SUPPORT_NUMBER.replace(/[^0-9]/g,'');
  if (n.startsWith('0')) n = '91' + n.slice(1);
  window.open('https://wa.me/' + n, '_blank');
};
</script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#0d1117;color:#e6edf3;font-family:'Inter',sans-serif;overflow:hidden;}

html,body{height:100%;height:100dvh;}
#chatScreen{display:none;flex-direction:column;height:100dvh;max-height:100dvh;background:linear-gradient(160deg,#0c1b33 0%,#0d1117 100%);overflow:hidden;}
.topbar{display:flex;align-items:center;gap:.6rem;padding:.6rem .9rem;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;}
.tb-logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.08em;background:linear-gradient(135deg,#fce475,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-name{font-weight:700;font-size:.95rem;}.tb-status{font-size:.68rem;color:#3fb950;display:flex;align-items:center;gap:.3rem;}
.tb-status::before{content:'';width:6px;height:6px;border-radius:50%;background:#3fb950;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}
.tb-actions{margin-left:auto;display:flex;gap:.35rem;}
.tb-act-btn{width:30px;height:30px;border-radius:50%;border:1px solid #30363d;background:rgba(255,255,255,.03);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:border-color .2s,background .2s;}
.tb-act-btn.call:hover{border-color:#3fb950;background:rgba(63,185,80,.1);}
.tb-act-btn.wa:hover{border-color:#25d366;background:rgba(37,211,102,.1);}

.msgs{flex:1;overflow-y:auto;padding:1rem .9rem;display:flex;flex-direction:column;gap:.5rem;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:3px;}.msgs::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px;}
.empty-hint{text-align:center;color:#484f58;font-size:.82rem;padding:2rem;margin:auto;}
.date-div{text-align:center;font-size:.65rem;color:#8b949e;position:relative;margin:.3rem 0;}
.date-div::before,.date-div::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:#21262d;}
.date-div::before{left:0;}.date-div::after{right:0;}
.msg{display:flex;flex-direction:column;max-width:78%;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.sent{align-self:flex-end;align-items:flex-end;}.msg.recv{align-self:flex-start;align-items:flex-start;}
.bubble{padding:.6rem .85rem;border-radius:14px;font-size:.9rem;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
.msg.sent .bubble{background:linear-gradient(135deg,#1a6b3c,#238636);border-bottom-right-radius:4px;color:#fff;}
.msg.recv .bubble{background:#21262d;border:1px solid #30363d;border-bottom-left-radius:4px;}
.msg.admin-bubble .bubble{background:linear-gradient(135deg,#1c1a0e,#252010);border-color:rgba(212,168,67,.3);}
.msg-sender{font-size:.65rem;font-weight:700;color:#d4a843;margin-bottom:2px;padding:0 3px;}
.msg-time{font-size:.62rem;color:#8b949e;margin-top:2px;padding:0 3px;}
.msg-img{max-width:210px;max-height:190px;border-radius:10px;display:block;cursor:zoom-in;object-fit:cover;}

.inputbar{display:flex;align-items:flex-end;gap:.45rem;padding:.6rem .7rem calc(.6rem + env(safe-area-inset-bottom));background:#161b22;border-top:1px solid #30363d;flex-shrink:0;position:relative;z-index:5;}
.inputbar textarea{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:12px;color:#e6edf3;font-family:'Inter',sans-serif;font-size:.9rem;padding:.55rem .8rem;resize:none;min-height:42px;max-height:120px;outline:none;line-height:1.45;transition:border-color .2s;}
.inputbar textarea:focus{border-color:#d4a843;}.inputbar textarea::placeholder{color:#484f58;}
.ico-btn{width:40px;height:40px;border-radius:10px;border:1px solid #30363d;background:rgba(255,255,255,.03);color:#8b949e;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;transition:border-color .2s,color .2s;}
.ico-btn:hover{border-color:#d4a843;color:#d4a843;}
.send-btn{width:40px;height:40px;border-radius:10px;border:none;background:linear-gradient(135deg,#25d366,#1aad55);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(37,211,102,.35);transition:transform .15s;}
.send-btn:hover{transform:scale(1.08);}.send-btn:active{transform:scale(.96);}

#namePrompt{position:fixed;inset:0;z-index:50;background:radial-gradient(ellipse 80% 60% at 50% 0%,#0d1e3a,#0d1117);display:none;align-items:center;justify-content:center;padding:1.5rem;}
.np-box{background:#161b22;border:1.5px solid rgba(212,168,67,.3);border-radius:18px;padding:2rem 1.75rem;width:100%;max-width:330px;display:flex;flex-direction:column;align-items:center;gap:1rem;}
.np-logo{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:.08em;background:linear-gradient(135deg,#fce475,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.np-box h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;color:#d4a843;}
.np-box p{font-size:.78rem;color:#8b949e;text-align:center;line-height:1.5;}
.np-box input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:10px;color:#e6edf3;font-family:'Inter',sans-serif;font-size:.95rem;padding:.7rem 1rem;outline:none;transition:border-color .2s;}
.np-box input:focus{border-color:#d4a843;}
.np-start{width:100%;padding:.75rem;background:linear-gradient(135deg,#d4a843,#a07820);border:none;border-radius:10px;color:#000;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.1em;cursor:pointer;}
.np-trust{font-size:.68rem;color:#484f58;display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;}

#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center;cursor:zoom-out;}
#lbImg{max-width:92vw;max-height:88vh;border-radius:12px;object-fit:contain;}
.toast{position:fixed;bottom:72px;right:14px;background:#21262d;border:1px solid rgba(212,168,67,.35);border-radius:12px;padding:.6rem 1rem;font-size:.78rem;z-index:400;display:none;align-items:center;gap:.5rem;max-width:260px;box-shadow:0 6px 20px rgba(0,0,0,.4);}
.toast.show{display:flex;}
</style>
</head>
<body>

<!-- NAME PROMPT -->
<div id="namePrompt">
  <div class="np-box">
    <div class="np-logo">2X BOOK</div>
    <h2>👋 Welcome!</h2>
    <p>Apna naam daalo aur 2X Book support team se baat shuru karo!</p>
    <input id="custNameInput" type="text" placeholder="Aapka naam..." maxlength="30" onkeydown="nameKey(event)">
    <button class="np-start" onclick="confirmName()">CHAT SHURU KARO</button>
    <div class="np-trust">🔒 Safe • 🛡️ Secure • 🔐 Private</div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen">
  <div class="topbar">
    <div class="tb-logo">2X</div>
    <div style="display:flex;flex-direction:column;gap:1px;">
      <div class="tb-name">2X Book Support</div>
      <div class="tb-status">Online — ready to help</div>
    </div>
    <div class="tb-actions">
      <button class="tb-act-btn call" onclick="callSupport()" title="Call karein">📞</button>
      <button class="tb-act-btn wa" onclick="waSupport()" title="WhatsApp">💬</button>
    </div>
  </div>
  <div class="msgs" id="custMsgs"></div>
  <div class="inputbar">
    <button class="ico-btn" onclick="custPickImg()" title="Photo bhejo">📷</button>
    <input type="file" id="custFileInput" accept="image/*" onchange="custImgChosen(event)" style="display:none">
    <textarea id="custInput" placeholder="Message likho..." rows="1" onkeydown="custSendKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="custSend()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()"><img id="lbImg" src="" alt=""></div>
<div class="toast" id="toast"></div>
</body>
</html>
