<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>2X BOOK — Support Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, update, get, serverTimestamp, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAItHjlPTWJBM8jGjWGUX8oUGFqfP_cpgo",
  authDomain:        "xbook-chat.firebaseapp.com",
  databaseURL:       "https://xbook-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "xbook-chat",
  storageBucket:     "xbook-chat.firebasestorage.app",
  messagingSenderId: "652493061355",
  appId:             "1:652493061355:web:396fdf39a961024b3e52ae",
  measurementId:     "G-YZBRFYNVHN"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const SUPPORT_NUMBER = "09201849287";
const WELCOME_MSG    = "🌟 2X mein aapka swagat hai 🌟";

let custSessionId = null, custName = '', prevMsgCount = 0;
let mediaRecorder = null, audioChunks = [], recordStart = 0, recTimer = null;
let typingTimer = null;

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('2xbook_my_session');
  const savedName = localStorage.getItem('2xbook_my_name');
  if (saved && savedName) {
    custSessionId = saved; custName = savedName;
    get(ref(db, `sessions/${saved}`)).then(snap => {
      if (snap.exists()) enterChat(false);
      else { localStorage.clear(); show('namePrompt'); document.getElementById('custNameInput').focus(); }
    }).catch(()=>{ show('namePrompt'); });
  } else { show('namePrompt'); document.getElementById('custNameInput').focus(); }
});

window.confirmName = async () => {
  const val = document.getElementById('custNameInput').value.trim();
  if (!val) { document.getElementById('custNameInput').focus(); return; }
  custName = val;
  custSessionId = 'sess_' + Date.now();
  localStorage.setItem('2xbook_my_session', custSessionId);
  localStorage.setItem('2xbook_my_name', custName);
  await set(ref(db, `sessions/${custSessionId}`), {
    name: custName, createdAt: serverTimestamp(), lastTime: serverTimestamp(), unread: 0, online: true
  });
  onDisconnect(ref(db, `sessions/${custSessionId}/online`)).set(false);
  enterChat(true);
};
window.nameKey = (e) => { if (e.key === 'Enter') window.confirmName(); };

function enterChat(isNew) {
  hide('namePrompt'); show('chatScreen');
  onDisconnect(ref(db, `sessions/${custSessionId}/online`)).set(false);
  update(ref(db, `sessions/${custSessionId}`), { online:true });
  if (isNew) setTimeout(()=>pushMsg({ from:'admin', senderName:'2X Book Support', text:WELCOME_MSG, type:'text', time:Date.now() }), 1200);
  onValue(ref(db, `sessions/${custSessionId}/msgs`), snap => renderMsgs(snap));
  // listen admin typing
  onValue(ref(db, `sessions/${custSessionId}/adminTyping`), snap => {
    document.getElementById('typingInd').style.display = snap.val() ? 'flex' : 'none';
    scrollBot();
  });
}

window.custSend = () => {
  const inp = document.getElementById('custInput');
  const text = inp.value.trim();
  if (!text || !custSessionId) return;
  inp.value = ''; autoResize(inp);
  update(ref(db, `sessions/${custSessionId}`), { custTyping:false });
  pushMsg({ from:'customer', senderName:custName, text, type:'text', time:Date.now() });
};
window.custSendKey = (e) => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();window.custSend();} };
window.custTyping = () => {
  if (!custSessionId) return;
  update(ref(db, `sessions/${custSessionId}`), { custTyping:true });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(()=>update(ref(db, `sessions/${custSessionId}`), { custTyping:false }), 2000);
};
window.custPickImg = () => document.getElementById('custFileInput').click();
window.custImgChosen = (e) => {
  const file = e.target.files[0]; if(!file) return;
  if (file.size > 2*1024*1024) { showToast('❌ Image 2MB se chhoti honi chahiye!'); return; }
  e.target.value = '';
  showToast('📤 Bhej rahe hain...');
  const reader = new FileReader();
  reader.onload = ev => { pushMsg({ from:'customer', senderName:custName, text:ev.target.result, type:'image', time:Date.now() }); showToast('✅ Sent!'); };
  reader.readAsDataURL(file);
};

window.toggleVoice = async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') { stopRecording(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    mediaRecorder = new MediaRecorder(stream); audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type:'audio/webm' });
      if (blob.size > 1024*1024) { showToast('❌ Voice 1MB se chhota rakho'); stream.getTracks().forEach(t=>t.stop()); return; }
      const reader = new FileReader();
      reader.onload = ev => { pushMsg({ from:'customer', senderName:custName, text:ev.target.result, type:'voice', time:Date.now() }); showToast('✅ Voice sent!'); };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start(); recordStart = Date.now();
    document.getElementById('recBar').style.display='flex';
    document.getElementById('micBtn').classList.add('recording');
    recTimer = setInterval(()=>{ const s=Math.floor((Date.now()-recordStart)/1000); document.getElementById('recTime').textContent=`0:${s<10?'0':''}${s}`; if(s>=30)stopRecording(); },200);
  } catch(err){ showToast('❌ Mic permission do!'); }
};
function stopRecording(){ if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop(); clearInterval(recTimer); document.getElementById('recBar').style.display='none'; document.getElementById('micBtn').classList.remove('recording'); }
window.cancelVoice = () => { if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.onstop=null;mediaRecorder.stop();mediaRecorder.stream.getTracks().forEach(t=>t.stop());} clearInterval(recTimer); document.getElementById('recBar').style.display='none'; document.getElementById('micBtn').classList.remove('recording'); showToast('Cancel'); };

function pushMsg(msg) {
  push(ref(db, `sessions/${custSessionId}/msgs`), msg);
  if (msg.from === 'customer') get(ref(db, `sessions/${custSessionId}/unread`)).then(snap =>
    update(ref(db, `sessions/${custSessionId}`), { unread:(snap.val()||0)+1, lastTime:serverTimestamp() }));
}

function renderMsgs(snap) {
  const c = document.getElementById('custMsgs');
  const typingEl = document.getElementById('typingInd');
  const wasBot = c.scrollHeight - c.scrollTop - c.clientHeight < 150;
  const data = snap.val();
  // clear but keep typing indicator
  [...c.querySelectorAll('.msg,.date-div,.empty-hint')].forEach(e=>e.remove());
  if (!data) {
    const e=document.createElement('div'); e.className='empty-hint'; e.textContent='💬 Message likhkar baat shuru karo';
    c.insertBefore(e, typingEl); return;
  }
  const msgs = Object.entries(data).sort((a,b)=>(a[1].time||0)-(b[1].time||0));
  if (msgs.length > prevMsgCount && prevMsgCount !== 0) {
    const last = msgs[msgs.length-1][1];
    if (last.from === 'admin') beep();
  }
  prevMsgCount = msgs.length;
  msgs.forEach(([key,m]) => { if (m.from==='admin' && !m.seen) update(ref(db, `sessions/${custSessionId}/msgs/${key}`), { seen:true }); });

  let lastDate = '';
  msgs.forEach(([key,msg]) => {
    const ds = new Date(msg.time).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
    const today = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
    if (ds !== lastDate) { lastDate=ds; const d=document.createElement('div'); d.className='date-div'; d.textContent=ds===today?'Aaj':ds; c.insertBefore(d, typingEl); }
    const isSent = msg.from === 'customer';
    const row = document.createElement('div');
    row.className = 'msg-row ' + (isSent?'sent':'recv');

    // avatar
    const av = document.createElement('div');
    av.className = 'avatar ' + (isSent?'av-cust':'av-admin');
    av.textContent = isSent ? (custName[0]||'U').toUpperCase() : '2X';

    const w = document.createElement('div');
    w.className = 'msg ' + (isSent?'sent':'recv admin-bubble');
    if (!isSent) { const s=document.createElement('div'); s.className='msg-sender'; s.textContent='2X Book Support'; w.appendChild(s); }
    const b = document.createElement('div'); b.className='bubble';
    if (msg.type==='image') { const i=document.createElement('img'); i.src=msg.text; i.className='msg-img'; i.onclick=()=>openLightbox(msg.text); b.appendChild(i); }
    else if (msg.type==='voice') { const a=document.createElement('audio'); a.src=msg.text; a.controls=true; a.className='msg-audio'; b.appendChild(a); }
    else b.textContent = msg.text;
    w.appendChild(b);
    const meta=document.createElement('div'); meta.className='msg-time';
    let tick = isSent ? (msg.seen ? ' <span class="tick seen">✓✓</span>' : ' <span class="tick">✓</span>') : '';
    meta.innerHTML = fmtTime(msg.time) + tick;
    w.appendChild(meta);

    if (isSent) { row.appendChild(w); row.appendChild(av); }
    else { row.appendChild(av); row.appendChild(w); }
    c.insertBefore(row, typingEl);
  });
  if (wasBot) scrollBot();
}

function beep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=720;o.type='sine';g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o.start();o.stop(ctx.currentTime+0.3);}catch(e){}}
function show(id){document.getElementById(id).style.display='flex';}
function hide(id){document.getElementById(id).style.display='none';}
function scrollBot(){const e=document.getElementById('custMsgs');requestAnimationFrame(()=>{e.scrollTop=e.scrollHeight;});}
function fmtTime(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
window.autoResize=(el)=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';window.custTyping();};
window.openLightbox=(s)=>{document.getElementById('lbImg').src=s;document.getElementById('lightbox').style.display='flex';};
window.closeLightbox=()=>{document.getElementById('lightbox').style.display='none';};
let toastT;
function showToast(m,d=2500){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),d);}
window.callSupport=()=>{window.location.href='tel:'+SUPPORT_NUMBER;};
window.waSupport=()=>{let n=SUPPORT_NUMBER.replace(/[^0-9]/g,'');if(n.startsWith('0'))n='91'+n.slice(1);window.open('https://wa.me/'+n,'_blank');};
</script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;height:100dvh;background:#070b14;color:#e6edf3;font-family:'Inter',sans-serif;overflow:hidden;}

/* ════ GOLDEN 2X LOGO BADGE ════ */
.logo-badge{position:relative;width:var(--sz,80px);height:var(--sz,80px);flex-shrink:0;}
.logo-badge .ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(212,168,67,.55);animation:spin 16s linear infinite;}
.logo-badge .ring::before{content:'';position:absolute;top:-3px;left:32%;width:18%;height:5px;background:#fce475;border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
.logo-badge .circle{position:absolute;inset:6px;border-radius:50%;background:radial-gradient(circle at 38% 32%,rgba(212,168,67,.28) 0%,#0a0f1c 65%);border:2px solid #d4a843;box-shadow:0 0 24px rgba(212,168,67,.4),inset 0 0 16px rgba(212,168,67,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:.85;}
.logo-badge .l2x{font-family:'Bebas Neue',sans-serif;font-size:calc(var(--sz,80px)*.34);background:linear-gradient(170deg,#fce475,#d4a843 55%,#9a7020);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-badge .lbk{font-family:'Bebas Neue',sans-serif;font-size:calc(var(--sz,80px)*.14);letter-spacing:.15em;color:#d4a843;opacity:.85;}

/* ════ CHAT SCREEN ════ */
#chatScreen{display:none;flex-direction:column;height:100dvh;max-height:100dvh;overflow:hidden;position:relative;
  background:
    radial-gradient(ellipse 90% 50% at 50% 0%, rgba(20,40,75,.5) 0%, transparent 60%),
    radial-gradient(ellipse 70% 40% at 15% 90%, rgba(212,168,67,.04) 0%, transparent 55%),
    linear-gradient(170deg,#0a1322 0%,#070b14 60%);}
/* faint pattern */
#chatScreen::before{content:'';position:absolute;inset:0;opacity:.025;pointer-events:none;
  background-image:radial-gradient(circle at 20% 30%, #d4a843 1px, transparent 1px),radial-gradient(circle at 70% 60%, #d4a843 1px, transparent 1px);
  background-size:60px 60px;}

/* ════ PREMIUM HEADER ════ */
.topbar{display:flex;align-items:center;gap:.65rem;padding:.55rem .9rem;background:linear-gradient(180deg,#11182a,#0d1320);border-bottom:1px solid rgba(212,168,67,.2);flex-shrink:0;position:relative;z-index:5;}
.topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#d4a843,transparent);}
.tb-head-logo{--sz:42px;}
.tb-info{display:flex;flex-direction:column;gap:0;}
.tb-name{font-weight:700;font-size:.92rem;color:#fff;letter-spacing:.01em;}
.tb-tag{font-size:.6rem;color:#d4a843;letter-spacing:.05em;opacity:.8;}
.tb-status{font-size:.66rem;color:#3fb950;display:flex;align-items:center;gap:.3rem;margin-top:1px;}
.tb-status .dot{width:7px;height:7px;border-radius:50%;background:#3fb950;box-shadow:0 0 0 0 rgba(63,185,80,.6);animation:livepulse 1.8s infinite;}
@keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,.6);}70%{box-shadow:0 0 0 7px rgba(63,185,80,0);}100%{box-shadow:0 0 0 0 rgba(63,185,80,0);}}
.tb-actions{margin-left:auto;display:flex;gap:.4rem;}
.tb-act-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(212,168,67,.3);background:rgba(255,255,255,.03);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .2s;}
.tb-act-btn.call:hover{border-color:#3fb950;background:rgba(63,185,80,.12);transform:scale(1.08);}
.tb-act-btn.wa:hover{border-color:#25d366;background:rgba(37,211,102,.12);transform:scale(1.08);}

/* ════ MESSAGES ════ */
.msgs{flex:1;overflow-y:auto;padding:1rem .75rem;display:flex;flex-direction:column;gap:.55rem;scroll-behavior:smooth;position:relative;z-index:1;}
.msgs::-webkit-scrollbar{width:3px;}.msgs::-webkit-scrollbar-thumb{background:#2a3550;border-radius:2px;}
.empty-hint{text-align:center;color:#3a4straight;color:#465573;font-size:.82rem;padding:2rem;margin:auto;}
.date-div{align-self:center;font-size:.62rem;color:#8b949e;background:rgba(255,255,255,.05);padding:2px 12px;border-radius:100px;margin:.3rem 0;}

.msg-row{display:flex;align-items:flex-end;gap:.45rem;max-width:88%;animation:msgIn .28s cubic-bezier(.2,.8,.2,1);}
@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.msg-row.sent{align-self:flex-end;flex-direction:row;}
.msg-row.recv{align-self:flex-start;}
.avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:.03em;}
.av-admin{background:radial-gradient(circle at 38% 32%,rgba(212,168,67,.3),#0a0f1c);border:1.5px solid #d4a843;color:#fce475;}
.av-cust{background:linear-gradient(135deg,#1a6b3c,#15512e);border:1.5px solid #2a8a52;color:#fff;}
.msg{display:flex;flex-direction:column;}
.msg.sent{align-items:flex-end;}.msg.recv{align-items:flex-start;}
.bubble{padding:.6rem .85rem;border-radius:16px;font-size:.9rem;line-height:1.5;word-break:break-word;white-space:pre-wrap;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.msg.sent .bubble{background:linear-gradient(135deg,#1f7d46,#176235);border-bottom-right-radius:5px;color:#fff;}
.msg.recv .bubble{background:linear-gradient(135deg,#1b2435,#161d2b);border:1px solid rgba(212,168,67,.25);border-bottom-left-radius:5px;}
.msg-sender{font-size:.62rem;font-weight:700;color:#d4a843;margin-bottom:3px;padding:0 4px;}
.msg-time{font-size:.6rem;color:#8b949e;margin-top:3px;padding:0 4px;display:flex;align-items:center;gap:3px;}
.tick{color:#8b949e;font-size:.68rem;}.tick.seen{color:#4fc3f7;}
.msg-img{max-width:210px;max-height:190px;border-radius:12px;display:block;cursor:zoom-in;object-fit:cover;}
.msg-audio{max-width:210px;height:38px;}

/* typing indicator */
.typing-ind{display:none;align-self:flex-start;align-items:center;gap:.45rem;margin-left:2px;}
.typing-ind .ti-av{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 38% 32%,rgba(212,168,67,.3),#0a0f1c);border:1.5px solid #d4a843;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-family:'Bebas Neue';color:#fce475;}
.typing-bub{background:linear-gradient(135deg,#1b2435,#161d2b);border:1px solid rgba(212,168,67,.25);border-radius:16px;border-bottom-left-radius:5px;padding:.65rem .8rem;display:flex;gap:4px;}
.tdot{width:7px;height:7px;border-radius:50%;background:#d4a843;animation:td 1.2s infinite;}
.tdot:nth-child(2){animation-delay:.2s;}.tdot:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-5px);opacity:1;}}

/* recording */
.recbar{display:none;align-items:center;gap:.6rem;padding:.5rem .9rem;background:#2a1a1a;border-top:1px solid #5a2020;flex-shrink:0;position:relative;z-index:5;}
.recdot{width:12px;height:12px;border-radius:50%;background:#e3282c;animation:recpulse 1s infinite;}
@keyframes recpulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.rectime{font-size:.85rem;color:#fff;font-weight:600;}.rec-hint{font-size:.68rem;color:#8b949e;}
.rec-cancel{margin-left:auto;background:none;border:1px solid #5a2020;color:#e3282c;border-radius:8px;padding:.3rem .8rem;font-size:.75rem;cursor:pointer;font-family:inherit;}

/* input */
.inputbar{display:flex;align-items:flex-end;gap:.4rem;padding:.6rem .7rem calc(.6rem + env(safe-area-inset-bottom));background:linear-gradient(180deg,#0d1320,#11182a);border-top:1px solid rgba(212,168,67,.15);flex-shrink:0;position:relative;z-index:5;}
.inputbar textarea{flex:1;background:#0a0f1c;border:1px solid #2a3550;border-radius:14px;color:#e6edf3;font-family:'Inter',sans-serif;font-size:.9rem;padding:.6rem .85rem;resize:none;min-height:42px;max-height:120px;outline:none;line-height:1.45;transition:border-color .2s;}
.inputbar textarea:focus{border-color:#d4a843;}.inputbar textarea::placeholder{color:#465573;}
.ico-btn{width:40px;height:40px;border-radius:12px;border:1px solid #2a3550;background:rgba(255,255,255,.03);color:#8b949e;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;transition:all .2s;}
.ico-btn:hover{border-color:#d4a843;color:#d4a843;}
.ico-btn:active{transform:scale(.9);}
.ico-btn.recording{background:#e3282c;border-color:#e3282c;color:#fff;animation:recpulse 1s infinite;}
.send-btn{width:42px;height:42px;border-radius:12px;border:none;background:linear-gradient(135deg,#2ee370,#1aad55);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 12px rgba(37,211,102,.4);transition:transform .15s;}
.send-btn:hover{transform:scale(1.1);}.send-btn:active{transform:scale(.92);}

/* ════ WELCOME SCREEN (STADIUM) ════ */
#namePrompt{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:1.5rem;overflow:hidden;
  background:radial-gradient(ellipse 100% 55% at 50% 0%,#10233f 0%,#070b14 65%);}
.np-rays{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.np-ray{position:absolute;top:-10%;width:2px;height:130%;background:linear-gradient(to bottom,rgba(245,200,80,.16) 0%,transparent 60%);transform-origin:top center;filter:blur(2px);}
.np-ray:nth-child(1){left:12%;transform:rotate(-22deg);}
.np-ray:nth-child(2){left:30%;transform:rotate(-9deg);opacity:.6;}
.np-ray:nth-child(3){right:30%;transform:rotate(9deg);opacity:.6;}
.np-ray:nth-child(4){right:12%;transform:rotate(22deg);}
.np-orb{position:absolute;top:-40px;width:200px;height:110px;background:radial-gradient(ellipse,rgba(212,168,67,.25),transparent 70%);filter:blur(20px);}
.np-orb.l{left:-30px;}.np-orb.r{right:-30px;}
.np-box{position:relative;z-index:2;background:rgba(13,19,32,.85);border:1.5px solid rgba(212,168,67,.35);border-radius:22px;padding:2.25rem 1.75rem;width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:1.1rem;backdrop-filter:blur(12px);box-shadow:0 10px 50px rgba(0,0,0,.5),0 0 40px rgba(212,168,67,.08);animation:boxIn .6s cubic-bezier(.16,1,.3,1);}
@keyframes boxIn{from{opacity:0;transform:translateY(20px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.np-welcome-logo{--sz:96px;}
.np-box h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em;color:#fff;}
.np-box h2 span{background:linear-gradient(90deg,#fce475,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.np-box p{font-size:.78rem;color:#8b949e;text-align:center;line-height:1.55;}
.np-box input{width:100%;background:#0a0f1c;border:1px solid #2a3550;border-radius:12px;color:#e6edf3;font-family:'Inter',sans-serif;font-size:.95rem;padding:.75rem 1rem;outline:none;transition:border-color .2s;text-align:center;}
.np-box input:focus{border-color:#d4a843;}
.np-start{width:100%;padding:.8rem;background:linear-gradient(135deg,#fce475,#d4a843 55%,#a07820);border:none;border-radius:12px;color:#0a0f1c;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.1em;cursor:pointer;box-shadow:0 4px 18px rgba(212,168,67,.35);transition:transform .15s;}
.np-start:active{transform:scale(.97);}
.np-trust{font-size:.66rem;color:#5a6party;color:#5a677f;display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;}

#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;align-items:center;justify-content:center;cursor:zoom-out;}
#lbImg{max-width:92vw;max-height:88vh;border-radius:14px;object-fit:contain;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(33,38,45,.96);border:1px solid rgba(212,168,67,.35);border-radius:100px;padding:.55rem 1.2rem;font-size:.78rem;z-index:400;display:none;align-items:center;gap:.5rem;box-shadow:0 6px 20px rgba(0,0,0,.5);backdrop-filter:blur(8px);}
.toast.show{display:flex;animation:toastIn .3s;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div id="namePrompt">
  <div class="np-rays"><div class="np-ray"></div><div class="np-ray"></div><div class="np-ray"></div><div class="np-ray"></div></div>
  <div class="np-orb l"></div><div class="np-orb r"></div>
  <div class="np-box">
    <div class="logo-badge np-welcome-logo">
      <div class="ring"></div>
      <div class="circle"><span class="l2x">2X</span><span class="lbk">BOOK</span></div>
    </div>
    <h2>👋 <span>Welcome!</span></h2>
    <p>Apna naam daalo aur 2X Book support team se baat shuru karo!</p>
    <input id="custNameInput" type="text" placeholder="Aapka naam..." maxlength="30" onkeydown="nameKey(event)">
    <button class="np-start" onclick="confirmName()">CHAT SHURU KARO</button>
    <div class="np-trust">🔒 Safe • 🛡️ Secure • 🔐 Private</div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen">
  <div class="topbar">
    <div class="logo-badge tb-head-logo">
      <div class="ring"></div>
      <div class="circle"><span class="l2x">2X</span><span class="lbk">BOOK</span></div>
    </div>
    <div class="tb-info">
      <div class="tb-name">2X Book Support</div>
      <div class="tb-tag">India's Trusted Sports Community</div>
      <div class="tb-status"><span class="dot"></span> Online — ready to help</div>
    </div>
    <div class="tb-actions">
      <button class="tb-act-btn call" onclick="callSupport()" title="Call">📞</button>
      <button class="tb-act-btn wa" onclick="waSupport()" title="WhatsApp">💬</button>
    </div>
  </div>

  <div class="msgs" id="custMsgs">
    <!-- typing indicator -->
    <div class="typing-ind" id="typingInd">
      <div class="ti-av">2X</div>
      <div class="typing-bub"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>
    </div>
  </div>

  <div class="recbar" id="recBar">
    <div class="recdot"></div>
    <span class="rectime" id="recTime">0:00</span>
    <span class="rec-hint">Recording... (mic dabao bhejne ke liye)</span>
    <button class="rec-cancel" onclick="cancelVoice()">Cancel</button>
  </div>

  <div class="inputbar">
    <button class="ico-btn" onclick="custPickImg()" title="Photo">📷</button>
    <input type="file" id="custFileInput" accept="image/*" onchange="custImgChosen(event)" style="display:none">
    <button class="ico-btn" id="micBtn" onclick="toggleVoice()" title="Voice">🎤</button>
    <textarea id="custInput" placeholder="Message likho..." rows="1" onkeydown="custSendKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="custSend()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()"><img id="lbImg" src="" alt=""></div>
<div class="toast" id="toast"></div>
</body>
</html>
